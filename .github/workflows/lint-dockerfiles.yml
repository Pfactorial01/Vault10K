name: Lint Dockerfiles

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  droast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # https://github.com/immanuwell/dockerfile-roast — Dockerfile linter (droast)
      - uses: immanuwell/dockerfile-roast@1.0.1
        with:
          files: "**/Dockerfile"
          min-severity: warning
